#set -g status-style 'bg=#1f040f,fg=#c87090'
#set -g pane-active-border-style 'fg=#c87090'
#set -g pane-border-style 'fg=#3a1530'

set -g status-style 'bg=#2a0a08,fg=#d4845a'
set -g pane-active-border-style 'fg=#d4845a'
set -g pane-border-style 'fg=#3a1510'
set -g pane-border-lines heavy

# Show session name in terminal/tab title
set -g set-titles on
set -g set-titles-string '#T'
set -g allow-rename off

# No escape delay (fixes vim Esc responsiveness)
set -sg escape-time 0

# Vi mode for copy/scroll
setw -g mode-keys vi

# Mouse support (click to select pane, scroll, resize borders)
set -g mouse on

# Copy to system clipboard
set -g set-clipboard on
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Ctrl+Space as prefix (ergonomic, cross-platform)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Prefix + Arrow: switch pane (default)
# Prefix + Shift+Arrow: resize pane by 5
# Quick pane jumps
bind f select-pane -t 1    # fzf
bind c select-pane -t 2    # claude

# Prefix + Shift+Arrow: resize pane by 5
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5

# Pulse — project activity EKG
bind p display-popup -E -w 100% -h 50% -x 0 -y 999 "pulse"
