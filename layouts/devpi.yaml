name: devpi
description: TMUX IDE for PI.dev
focus: [1, 1]

columns:
  - width: 20%
    panes:
      - height: 100%
        name: fstop
        bg: "#000000"
        cmd: "fstop"
  - width: 49%
    panes:
      - height: 69%
        name: pi
        bg: "#000000"
        cmd: "pi "
      - height: 28%
        name: terminal
        bg: "#000000"
  - width: 29%
    panes:
      - height: 42%
        name: notify
        bg: "#000000"
        cmd: "agent-notify"
      - height: 25%
        name: spark-one
        bg: "#000000"
        cmd: "ssh spark-one"
      - height: 28%
        name: spark-two
        bg: "#000000"
        cmd: "ssh spark-two"
